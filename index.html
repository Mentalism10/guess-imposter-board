<!DOCTYPE html>
<html>
<head>
    <title>Guess The Imposter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">

    <div id="roomInfo">
        Room: Loading...
    </div>

    <div id="playerInfo">
        Player: Loading...
    </div>

</div>

<div id="gamePanel">
    <h3 id="turnPlayer">Current Turn: Waiting...</h3>
    <h3 id="timer">Time Left: 20s</h3>
    <button id="finishTurn">✅ Finish Turn</button>
</div>

<div class="toolbar">

    <button id="clear">🗑 Clear</button>

    <button class="color" data-color="black">⚫</button>
    <button class="color" data-color="red">🔴</button>
    <button class="color" data-color="blue">🔵</button>
    <button class="color" data-color="green">🟢</button>

    <button id="eraser">🧽 Eraser</button>

</div>

<canvas id="board"></canvas>

<script src="script.js"></script>

</body>
</html>
